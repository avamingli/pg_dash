services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - PG_DSN=${PG_DSN}
      - PGDATA=${PGDATA:-}
      - PORT=4000
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      - snapshot-data:/app/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  snapshot-data:
